<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SIE 2028 v8.3 · Sistema Inteligente Electoral</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="stylesheet" href="./assets/css/sidebar.css"/>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">SIE 2028</span>
        <span class="badge">v8.3</span>
      </div>
      <nav id="nav" class="nav" role="navigation" aria-label="Módulos" style="display:none;"></nav>
      <div class="topbar-right">
        <div id="global-controls" class="global-controls"></div>
        <button id="btn-export" class="btn-sm" title="Exportar PDF" style="display:none;">PDF</button>
        <button id="btn-theme" class="btn-icon" title="Cambiar tema">🌙</button>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Módulos">
      <div class="sidebar-header">
        <span class="sidebar-title">SIE 2028</span>
        <button class="sidebar-toggle" id="btn-sidebar-toggle" title="Colapsar menú">◀</button>
      </div>
      <div class="sidebar-nivel" id="sidebar-nivel-wrap">
        <label>Nivel electoral</label>
        <select id="sidebar-nivel-sel">
          <option value="pres">🗳 Presidencial</option>
          <option value="sen">🏛 Senado</option>
          <option value="dip">📋 Diputados</option>
          <option value="mun">🏘 Municipal</option>
        </select>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Análisis</div>
        <button class="sidebar-item active" data-route="dashboard" data-label="Dashboard"><span class="s-icon">📊</span><span class="s-label">Dashboard</span></button>
        <button class="sidebar-item" data-route="mapa" data-label="Mapa Electoral"><span class="s-icon">🗺️</span><span class="s-label">Mapa Electoral</span></button>
        <button class="sidebar-item" data-route="movilizacion" data-label="Movilización"><span class="s-icon">📢</span><span class="s-label">Movilización</span></button>
        <button class="sidebar-item" data-route="potencial" data-label="Potencial Electoral"><span class="s-icon">🎯</span><span class="s-label">Potencial Electoral</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Motores</div>
        <button class="sidebar-item" data-route="simulador" data-label="Simulador"><span class="s-icon">⚗️</span><span class="s-label">Simulador</span></button>
        <button class="sidebar-item" data-route="objetivo" data-label="Motor Objetivo"><span class="s-icon">🏆</span><span class="s-label">Motor Objetivo</span></button>
        <button class="sidebar-item" data-route="alianzas" data-label="Boleta Única / Alianzas"><span class="s-icon">🤝</span><span class="s-label">Boleta / Alianzas</span></button>
        <button class="sidebar-item" data-route="encuestas" data-label="Encuestas"><span class="s-icon">📈</span><span class="s-label">Encuestas</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Sistema</div>
        <button class="sidebar-item" data-route="auditoria" data-label="Auditoría de Datos"><span class="s-icon">🔍</span><span class="s-label">Auditoría</span></button>
      </div>
    </aside>
    <main class="main-content" id="main-content">
      <div id="view" class="view-container"></div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
